# ============================================================
# h5sgame - Ubuntu nginx 反代配置（生产环境）
# 用法：
#   1) 把本文件复制到服务器：/etc/nginx/sites-available/h5sgame.conf
#   2) ln -s /etc/nginx/sites-available/h5sgame.conf /etc/nginx/sites-enabled/h5sgame.conf
#   3) rm -f /etc/nginx/sites-enabled/default       # 删掉默认站点，避免冲突
#   4) nginx -t && systemctl reload nginx
# Node 服务由 systemd 管理：/etc/systemd/system/h5sgame.service
# ============================================================

# —— 如需 HTTPS：推荐用 certbot --nginx 自动生成 443 块并自动转发 80→443
#    sudo apt install certbot python3-certbot-nginx
#    sudo certbot --nginx -d your-domain.com

server {
    listen       80;
    listen       [::]:80;
    server_name  _;              # 未绑定域名时用 _；有域名则写 your-domain.com

    # 日志
    access_log  /var/log/nginx/h5sgame.access.log;
    error_log   /var/log/nginx/h5sgame.error.log  warn;

    # ============== Socket.IO 走 WebSocket 升级 ==============
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  1d;
        proxy_send_timeout  1d;
        proxy_buffering     off;
        proxy_cache         off;
    }

    # ============== 其他所有请求转发给 Node ==============
    # (Express 会提供 dist/index.html 和静态资源，以及 /api/deploy)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
    }
}
