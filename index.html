<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>H5 Small Game</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-user-select: none;
        user-select: none;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f1624;
        touch-action: none;
        overscroll-behavior: none;
      }

      #gameCanvas {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }

      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: rgba(15, 22, 36, 0.95);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        z-index: 10;
      }

      #loading .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #7fffa8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }

      #loadingMsg {
        font-size: 14px;
        opacity: 0.8;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* 底部 pop 提示 */
      #bottomHint {
        position: fixed;
        left: 50%;
        bottom: -60px;
        transform: translateX(-50%);
        min-width: 220px;
        max-width: 80vw;
        padding: 12px 22px;
        border-radius: 28px;
        background: rgba(12, 18, 32, 0.92);
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        line-height: 1.4;
        text-align: center;
        letter-spacing: 0.5px;
        border: 1px solid rgba(150, 180, 220, 0.3);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45), 0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        transition: bottom 0.28s cubic-bezier(0.2, 0.9, 0.3, 1), opacity 0.25s ease;
        opacity: 0;
        pointer-events: none;
        z-index: 20;
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      #bottomHint.visible {
        bottom: 28px;
        opacity: 1;
      }
      #bottomHint .title {
        color: #ffcc66;
        font-weight: 600;
        margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="loading">
      <div class="spinner"></div>
      <div id="loadingMsg">连接中...</div>
    </div>
    <div id="bottomHint"><span class="title">提示</span><span id="bottomHintText"></span></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
